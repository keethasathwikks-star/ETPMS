# ===================================================================
# ETPMS - Employee Task and Performance Management System
# ===================================================================

spring.application.name=ETPMS

# ---- PostgreSQL Database Configuration ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/etpms_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate Configuration ----
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- Server Configuration ----
server.port=${PORT:8080}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# ---- Spring Security - Default Admin Credentials ----
spring.security.user.name=admin
spring.security.user.password=admin123
# ---- AI Service Configuration ----
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

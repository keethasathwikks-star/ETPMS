# ===================================================================
# ETPMS - Employee Task and Performance Management System
# ===================================================================

spring.application.name=ETPMS

# ---- MySQL Database Configuration ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/etpms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate Configuration ----
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Server Configuration ----
server.port=${PORT:8080}

# ---- Spring Security - Default Admin Credentials ----
spring.security.user.name=admin
spring.security.user.password=admin123
# ---- AI Service Configuration ----
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}